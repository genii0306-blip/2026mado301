<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" width="900" height="340">
  <defs>
    <!-- Sapientia purple gradient -->
    <linearGradient id="gSapientia" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9333EA"/>
      <stop offset="100%" style="stop-color:#5B21B6"/>
    </linearGradient>
    <!-- Fortis red gradient -->
    <linearGradient id="gFortis" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444"/>
      <stop offset="100%" style="stop-color:#991B1B"/>
    </linearGradient>
    <!-- Natura green gradient -->
    <linearGradient id="gNatura" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E"/>
      <stop offset="100%" style="stop-color:#14532D"/>
    </linearGradient>
    <!-- Creare blue gradient -->
    <linearGradient id="gCreare" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8"/>
      <stop offset="100%" style="stop-color:#075985"/>
    </linearGradient>
    <!-- Lumen yellow gradient -->
    <linearGradient id="gLumen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FDE047"/>
      <stop offset="100%" style="stop-color:#92400E"/>
    </linearGradient>
    <!-- Regia navy gradient -->
    <linearGradient id="gRegia" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1E3A8A"/>
    </linearGradient>
    <!-- Gold shimmer -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE87A"/>
      <stop offset="50%" style="stop-color:#FFD23C"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <!-- Badge shape path (hanging banner style, 120x180) -->
  </defs>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- BADGE TEMPLATE: banner / pennant shape                  -->
  <!-- Each badge: 120w × 180h, with pointed bottom           -->
  <!-- Positions: x=30,180,330,480,630,780 (centered in 140px cols) -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- ── 1. SAPIENTIA (지혜 / 보라) ── x=30 -->
  <g transform="translate(30,20)">
    <!-- Banner shadow -->
    <path d="M5,5 L115,5 L115,145 L60,175 L5,145 Z" fill="rgba(0,0,0,0.2)"/>
    <!-- Banner body -->
    <path d="M0,0 L120,0 L120,140 L60,170 L0,140 Z" fill="url(#gSapientia)"/>
    <!-- Gold border -->
    <path d="M0,0 L120,0 L120,140 L60,170 L0,140 Z" fill="none" stroke="url(#gold)" stroke-width="3.5"/>
    <!-- Top decorative bar -->
    <rect x="0" y="0" width="120" height="22" fill="rgba(0,0,0,0.25)" rx="0"/>
    <!-- Rope hole top -->
    <circle cx="60" cy="0" r="6" fill="#FFD23C" stroke="#B8860B" stroke-width="1.5"/>
    <!-- Rope -->
    <line x1="60" y1="-20" x2="60" y2="0" stroke="#B8860B" stroke-width="3" stroke-dasharray="4,2"/>
    <!-- Decorative inner frame -->
    <path d="M10,28 L110,28 L110,132 L60,158 L10,132 Z" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <!-- Symbol: Book 📖 -->
    <g transform="translate(32,38)">
      <rect x="0" y="0" width="56" height="44" rx="4" fill="rgba(255,255,255,0.95)"/>
      <line x1="28" y1="0" x2="28" y2="44" stroke="#7C3AED" stroke-width="2"/>
      <line x1="6" y1="10" x2="22" y2="10" stroke="#7C3AED" stroke-width="1.5"/>
      <line x1="6" y1="17" x2="22" y2="17" stroke="#7C3AED" stroke-width="1.5"/>
      <line x1="6" y1="24" x2="22" y2="24" stroke="#7C3AED" stroke-width="1.5"/>
      <line x1="6" y1="31" x2="22" y2="31" stroke="#7C3AED" stroke-width="1.5"/>
      <line x1="34" y1="10" x2="50" y2="10" stroke="#7C3AED" stroke-width="1.5"/>
      <line x1="34" y1="17" x2="50" y2="17" stroke="#7C3AED" stroke-width="1.5"/>
      <line x1="34" y1="24" x2="50" y2="24" stroke="#7C3AED" stroke-width="1.5"/>
      <line x1="34" y1="31" x2="50" y2="31" stroke="#7C3AED" stroke-width="1.5"/>
    </g>
    <!-- Guild name -->
    <text x="60" y="105" text-anchor="middle" font-family="'Georgia','Times New Roman',serif" font-size="11" font-weight="700" fill="#FFE87A" letter-spacing="1">SAPIENTIA</text>
    <!-- Korean subtitle -->
    <text x="60" y="122" text-anchor="middle" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">지혜</text>
    <!-- Bottom star -->
    <polygon points="60,148 63,156 71,156 65,161 68,169 60,164 52,169 55,161 49,156 57,156" fill="#FFD23C" opacity="0.9" transform="translate(0,-10)"/>
  </g>

  <!-- ── 2. FORTIS (용기 / 빨강) ── x=180 -->
  <g transform="translate(180,20)">
    <path d="M5,5 L115,5 L115,145 L60,175 L5,145 Z" fill="rgba(0,0,0,0.2)"/>
    <path d="M0,0 L120,0 L120,140 L60,170 L0,140 Z" fill="url(#gFortis)"/>
    <path d="M0,0 L120,0 L120,140 L60,170 L0,140 Z" fill="none" stroke="url(#gold)" stroke-width="3.5"/>
    <rect x="0" y="0" width="120" height="22" fill="rgba(0,0,0,0.25)" rx="0"/>
    <circle cx="60" cy="0" r="6" fill="#FFD23C" stroke="#B8860B" stroke-width="1.5"/>
    <line x1="60" y1="-20" x2="60" y2="0" stroke="#B8860B" stroke-width="3" stroke-dasharray="4,2"/>
    <path d="M10,28 L110,28 L110,132 L60,158 L10,132 Z" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <!-- Symbol: Sword ⚔ -->
    <g transform="translate(34,36)">
      <!-- Crossed swords -->
      <line x1="10" y1="10" x2="42" y2="42" stroke="rgba(255,255,255,0.95)" stroke-width="4" stroke-linecap="round"/>
      <line x1="42" y1="10" x2="10" y2="42" stroke="rgba(255,255,255,0.95)" stroke-width="4" stroke-linecap="round"/>
      <!-- Guards -->
      <line x1="4" y1="16" x2="16" y2="4" stroke="#FFD23C" stroke-width="5" stroke-linecap="round"/>
      <line x1="36" y1="16" x2="48" y2="4" stroke="#FFD23C" stroke-width="5" stroke-linecap="round"/>
      <!-- Center diamond -->
      <polygon points="26,22 30,26 26,30 22,26" fill="#FFD23C"/>
    </g>
    <text x="60" y="105" text-anchor="middle" font-family="'Georgia','Times New Roman',serif" font-size="13" font-weight="700" fill="#FFE87A" letter-spacing="1">FORTIS</text>
    <text x="60" y="122" text-anchor="middle" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">용기</text>
    <polygon points="60,148 63,156 71,156 65,161 68,169 60,164 52,169 55,161 49,156 57,156" fill="#FFD23C" opacity="0.9" transform="translate(0,-10)"/>
  </g>

  <!-- ── 3. NATURA (탐구 / 초록) ── x=330 -->
  <g transform="translate(330,20)">
    <path d="M5,5 L115,5 L115,145 L60,175 L5,145 Z" fill="rgba(0,0,0,0.2)"/>
    <path d="M0,0 L120,0 L120,140 L60,170 L0,140 Z" fill="url(#gNatura)"/>
    <path d="M0,0 L120,0 L120,140 L60,170 L0,140 Z" fill="none" stroke="url(#gold)" stroke-width="3.5"/>
    <rect x="0" y="0" width="120" height="22" fill="rgba(0,0,0,0.25)" rx="0"/>
    <circle cx="60" cy="0" r="6" fill="#FFD23C" stroke="#B8860B" stroke-width="1.5"/>
    <line x1="60" y1="-20" x2="60" y2="0" stroke="#B8860B" stroke-width="3" stroke-dasharray="4,2"/>
    <path d="M10,28 L110,28 L110,132 L60,158 L10,132 Z" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <!-- Symbol: Leaf sprout 🌿 -->
    <g transform="translate(60,56)">
      <!-- Stem -->
      <line x1="0" y1="20" x2="0" y2="-8" stroke="rgba(255,255,255,0.9)" stroke-width="3" stroke-linecap="round"/>
      <!-- Large left leaf -->
      <path d="M0,0 C-24,-8 -28,-30 -8,-32 C4,-34 4,-10 0,0" fill="rgba(255,255,255,0.95)"/>
      <!-- Large right leaf -->
      <path d="M0,0 C24,-8 28,-30 8,-32 C-4,-34 -4,-10 0,0" fill="rgba(255,255,255,0.85)"/>
      <!-- Small leaf -->
      <path d="M0,-8 C10,-16 16,-28 4,-28 C-4,-28 -2,-14 0,-8" fill="rgba(255,255,255,0.7)"/>
    </g>
    <text x="60" y="105" text-anchor="middle" font-family="'Georgia','Times New Roman',serif" font-size="13" font-weight="700" fill="#FFE87A" letter-spacing="1">NATURA</text>
    <text x="60" y="122" text-anchor="middle" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">탐구</text>
    <polygon points="60,148 63,156 71,156 65,161 68,169 60,164 52,169 55,161 49,156 57,156" fill="#FFD23C" opacity="0.9" transform="translate(0,-10)"/>
  </g>

  <!-- ── 4. CREARE (창조 / 하늘) ── x=480 -->
  <g transform="translate(480,20)">
    <path d="M5,5 L115,5 L115,145 L60,175 L5,145 Z" fill="rgba(0,0,0,0.2)"/>
    <path d="M0,0 L120,0 L120,140 L60,170 L0,140 Z" fill="url(#gCreare)"/>
    <path d="M0,0 L120,0 L120,140 L60,170 L0,140 Z" fill="none" stroke="url(#gold)" stroke-width="3.5"/>
    <rect x="0" y="0" width="120" height="22" fill="rgba(0,0,0,0.25)" rx="0"/>
    <circle cx="60" cy="0" r="6" fill="#FFD23C" stroke="#B8860B" stroke-width="1.5"/>
    <line x1="60" y1="-20" x2="60" y2="0" stroke="#B8860B" stroke-width="3" stroke-dasharray="4,2"/>
    <path d="M10,28 L110,28 L110,132 L60,158 L10,132 Z" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <!-- Symbol: Palette 🎨 -->
    <g transform="translate(32,36)">
      <!-- Palette shape -->
      <ellipse cx="28" cy="22" rx="24" ry="20" fill="rgba(255,255,255,0.95)"/>
      <ellipse cx="28" cy="26" rx="10" ry="8" fill="url(#gCreare)"/>
      <!-- Color dots -->
      <circle cx="14" cy="12" r="5" fill="#EF4444"/>
      <circle cx="24" cy="7" r="5" fill="#FFD23C"/>
      <circle cx="35" cy="7" r="5" fill="#22C55E"/>
      <circle cx="44" cy="12" r="5" fill="#9333EA"/>
      <!-- Brush -->
      <line x1="46" y1="18" x2="58" y2="4" stroke="#8B5A2B" stroke-width="3" stroke-linecap="round"/>
      <ellipse cx="58" cy="4" rx="4" ry="6" fill="rgba(255,255,255,0.9)" transform="rotate(-40 58 4)"/>
    </g>
    <text x="60" y="105" text-anchor="middle" font-family="'Georgia','Times New Roman',serif" font-size="13" font-weight="700" fill="#FFE87A" letter-spacing="1">CREARE</text>
    <text x="60" y="122" text-anchor="middle" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">창조</text>
    <polygon points="60,148 63,156 71,156 65,161 68,169 60,164 52,169 55,161 49,156 57,156" fill="#FFD23C" opacity="0.9" transform="translate(0,-10)"/>
  </g>

  <!-- ── 5. LUMEN (협력 / 노랑) ── x=630 -->
  <g transform="translate(630,20)">
    <path d="M5,5 L115,5 L115,145 L60,175 L5,145 Z" fill="rgba(0,0,0,0.2)"/>
    <path d="M0,0 L120,0 L120,140 L60,170 L0,140 Z" fill="url(#gLumen)"/>
    <path d="M0,0 L120,0 L120,140 L60,170 L0,140 Z" fill="none" stroke="url(#gold)" stroke-width="3.5"/>
    <rect x="0" y="0" width="120" height="22" fill="rgba(0,0,0,0.25)" rx="0"/>
    <circle cx="60" cy="0" r="6" fill="white" stroke="#B8860B" stroke-width="1.5"/>
    <line x1="60" y1="-20" x2="60" y2="0" stroke="#B8860B" stroke-width="3" stroke-dasharray="4,2"/>
    <path d="M10,28 L110,28 L110,132 L60,158 L10,132 Z" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <!-- Symbol: Handshake 🤝 -->
    <g transform="translate(18,38)">
      <!-- Left hand -->
      <path d="M0,22 C0,10 8,4 16,4 L30,4 L36,16 L24,16 C22,16 20,18 22,22 L36,22 L36,38 L0,38 Z" fill="rgba(255,255,255,0.95)"/>
      <!-- Right hand -->
      <path d="M84,22 C84,10 76,4 68,4 L54,4 L48,16 L60,16 C62,16 64,18 62,22 L48,22 L48,38 L84,38 Z" fill="rgba(255,255,255,0.85)"/>
      <!-- Clasped center -->
      <path d="M36,12 C40,8 44,8 48,12 L48,38 L36,38 Z" fill="rgba(255,220,60,0.9)"/>
      <!-- Shine -->
      <ellipse cx="42" cy="22" rx="4" ry="12" fill="rgba(255,255,255,0.4)"/>
    </g>
    <text x="60" y="105" text-anchor="middle" font-family="'Georgia','Times New Roman',serif" font-size="13" font-weight="700" fill="rgba(0,0,0,0.75)" letter-spacing="1">LUMEN</text>
    <text x="60" y="122" text-anchor="middle" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="11" fill="rgba(0,0,0,0.65)">협력</text>
    <polygon points="60,148 63,156 71,156 65,161 68,169 60,164 52,169 55,161 49,156 57,156" fill="rgba(0,0,0,0.4)" opacity="0.9" transform="translate(0,-10)"/>
  </g>

  <!-- ── 6. REGIA (대표 / 남색) ── x=780 -->
  <g transform="translate(750,20)">
    <path d="M5,5 L115,5 L115,145 L60,175 L5,145 Z" fill="rgba(0,0,0,0.2)"/>
    <path d="M0,0 L120,0 L120,140 L60,170 L0,140 Z" fill="url(#gRegia)"/>
    <path d="M0,0 L120,0 L120,140 L60,170 L0,140 Z" fill="none" stroke="url(#gold)" stroke-width="3.5"/>
    <rect x="0" y="0" width="120" height="22" fill="rgba(0,0,0,0.25)" rx="0"/>
    <circle cx="60" cy="0" r="6" fill="#FFD23C" stroke="#B8860B" stroke-width="1.5"/>
    <line x1="60" y1="-20" x2="60" y2="0" stroke="#B8860B" stroke-width="3" stroke-dasharray="4,2"/>
    <path d="M10,28 L110,28 L110,132 L60,158 L10,132 Z" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <!-- Symbol: Crown 👑 -->
    <g transform="translate(24,38)">
      <!-- Crown base -->
      <rect x="0" y="28" width="72" height="14" rx="3" fill="#FFD23C"/>
      <!-- Crown peaks -->
      <polygon points="0,28 0,4 18,18 36,0 54,18 72,4 72,28" fill="#FFD23C"/>
      <!-- Gems -->
      <circle cx="36" cy="10" r="6" fill="#3B82F6"/>
      <circle cx="14" cy="22" r="4" fill="#EF4444"/>
      <circle cx="58" cy="22" r="4" fill="#22C55E"/>
      <!-- Crown shine -->
      <path d="M8,28 C8,16 16,10 24,16 L20,28 Z" fill="rgba(255,255,255,0.3)"/>
    </g>
    <text x="60" y="105" text-anchor="middle" font-family="'Georgia','Times New Roman',serif" font-size="13" font-weight="700" fill="#FFE87A" letter-spacing="1">REGIA</text>
    <text x="60" y="122" text-anchor="middle" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">대표</text>
    <polygon points="60,148 63,156 71,156 65,161 68,169 60,164 52,169 55,161 49,156 57,156" fill="#FFD23C" opacity="0.9" transform="translate(0,-10)"/>
  </g>

  <!-- ── Labels below ── -->
  <text x="90" y="230" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">SAPIENTIA</text>
  <text x="240" y="230" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">FORTIS</text>
  <text x="390" y="230" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">NATURA</text>
  <text x="540" y="230" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">CREARE</text>
  <text x="690" y="230" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">LUMEN</text>
  <text x="810" y="230" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">REGIA</text>

  <!-- Title bar at bottom -->
  <rect x="200" y="255" width="500" height="36" rx="6" fill="#1E7D3B"/>
  <text x="450" y="278" text-anchor="middle" font-family="'Georgia',serif" font-size="14" font-weight="700" fill="#FFD23C" letter-spacing="2">MADO ACADEMIA — GUILD BADGES</text>
</svg>
